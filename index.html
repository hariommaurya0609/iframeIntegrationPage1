<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Payment Form</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 40px auto;
        padding: 20px;
      }
      h1 {
        font-size: 22px;
        margin-bottom: 24px;
      }
      #payment-iframe {
        width: 100%;
        height: 400px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
      }
      #token-output {
        margin-top: 16px;
        padding: 12px;
        background: #f3f4f6;
        border-radius: 6px;
        font-family: monospace;
        font-size: 13px;
        word-break: break-all;
        min-height: 40px;
        color: #374151;
      }
    </style>
  </head>
  <body>
    <h1>Payment Form</h1>

    <!-- Container the iframe will be rendered into -->
    <div id="payment-iframe"></div>

    <!-- Hidden field that receives the token -->
    <input type="hidden" id="mytoken" name="mytoken" />

    <!-- Token display (for testing) -->
    <div id="token-output">Token will appear here after submission.</div>

    <!-- Load the checkout library from the iframe service -->
    <script src="https://iframe.thepineappledev.com/cardpointe-checkout.js"></script>
    <script>
      // Show the token once the iframe posts it back.
      window.addEventListener("message", function (event) {
        try {
          var data =
            typeof event.data === "string"
              ? JSON.parse(event.data)
              : event.data;
          if (data && data.message) {
            document.getElementById("mytoken").value = data.message;
            document.getElementById("token-output").textContent =
              "Token: " + data.message;
          }
        } catch (e) {
          /* ignore non-JSON messages */
        }
      });

      // Create and render the iframe using the builder API.
      createIframe("0f0300bc-1781-4dc1-baf0-aec625b8ff99")
        .config({
          cardlabel: "Card Number",
          placeholder: "1234 5678 9012 3456",
          iframeUrl:
            "https://iframe.thepineappledev.com?useexpiry=true&usecvv=true",
          apiUrl: "https://iframe.thepineappledev.com",
        })
        .tokenfieldName("mytoken")
        .iframeDivId("payment-iframe")
        .render();
    </script>
  </body>
</html>
